name: Release Notes

on:
  push:
    branches: [main]

jobs:
  release-log:
    name: Generate Release Log
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --format='%an')" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --format='%s')" >> "$GITHUB_OUTPUT"

          # Collect all commit messages since last tag (or last 10 if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --format='- %s (%h)' --no-merges)
          else
            COMMITS=$(git log -10 --format='- %s (%h)' --no-merges)
          fi
          # Write multiline output
          {
            echo "commits<<COMMITS_EOF"
            echo "$COMMITS"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Categorize changes
        id: categories
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          REF_RANGE="${LAST_TAG:+$LAST_TAG..HEAD}"
          REF_RANGE="${REF_RANGE:-HEAD~10..HEAD}"

          FEATURES=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -iE '^- (feat|add|new)' || true)
          FIXES=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -iE '^- (fix|bug|patch|hotfix)' || true)
          OTHER=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -viE '^- (feat|add|new|fix|bug|patch|hotfix)' || true)

          # Changed files summary
          if [ -n "$LAST_TAG" ]; then
            FILES=$(git diff --stat "$LAST_TAG"..HEAD | tail -1)
          else
            FILES=$(git diff --stat HEAD~1..HEAD | tail -1)
          fi

          {
            echo "features<<FEAT_EOF"
            echo "$FEATURES"
            echo "FEAT_EOF"
            echo "fixes<<FIX_EOF"
            echo "$FIXES"
            echo "FIX_EOF"
            echo "other<<OTHER_EOF"
            echo "$OTHER"
            echo "OTHER_EOF"
            echo "files<<FILES_EOF"
            echo "$FILES"
            echo "FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Append to RELEASES.md
        run: |
          ENTRY="## ${{ steps.info.outputs.date }} — \`${{ steps.info.outputs.sha_short }}\`

          **Latest:** ${{ steps.info.outputs.message }}
          **Author:** ${{ steps.info.outputs.author }}
          **Stats:** ${{ steps.categories.outputs.files }}
          "

          if [ -n "${{ steps.categories.outputs.features }}" ]; then
            ENTRY="$ENTRY
          ### Features
          ${{ steps.categories.outputs.features }}
          "
          fi

          if [ -n "${{ steps.categories.outputs.fixes }}" ]; then
            ENTRY="$ENTRY
          ### Fixes
          ${{ steps.categories.outputs.fixes }}
          "
          fi

          if [ -n "${{ steps.categories.outputs.other }}" ]; then
            ENTRY="$ENTRY
          ### Other
          ${{ steps.categories.outputs.other }}
          "
          fi

          ENTRY="$ENTRY
          ---
          "

          if [ -f RELEASES.md ]; then
            # Prepend new entry after the header
            HEADER=$(head -2 RELEASES.md)
            BODY=$(tail -n +3 RELEASES.md)
            echo "$HEADER" > RELEASES.md
            echo "" >> RELEASES.md
            echo "$ENTRY" >> RELEASES.md
            echo "$BODY" >> RELEASES.md
          else
            echo "# Release Log" > RELEASES.md
            echo "" >> RELEASES.md
            echo "$ENTRY" >> RELEASES.md
          fi

      - name: Commit release log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASES.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: update release log for ${{ steps.info.outputs.sha_short }}"
          git push
