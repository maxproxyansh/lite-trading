name: Release Notes

on:
  push:
    branches: [main]

jobs:
  release-log:
    name: Generate Release Log
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --format='%an')" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --format='%s')" >> "$GITHUB_OUTPUT"

          # Collect all commit messages since last tag (or last 10 if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --format='- %s (%h)' --no-merges)
          else
            COMMITS=$(git log -10 --format='- %s (%h)' --no-merges)
          fi
          # Write multiline output
          {
            echo "commits<<COMMITS_EOF"
            echo "$COMMITS"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Categorize changes
        id: categories
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          REF_RANGE="${LAST_TAG:+$LAST_TAG..HEAD}"
          REF_RANGE="${REF_RANGE:-HEAD~10..HEAD}"

          FEATURES=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -iE '^- (feat|add|new)' || true)
          FIXES=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -iE '^- (fix|bug|patch|hotfix)' || true)
          OTHER=$(git log "$REF_RANGE" --format='- %s (%h)' --no-merges | grep -viE '^- (feat|add|new|fix|bug|patch|hotfix)' || true)

          # Changed files summary
          if [ -n "$LAST_TAG" ]; then
            FILES=$(git diff --stat "$LAST_TAG"..HEAD | tail -1)
          else
            FILES=$(git diff --stat HEAD~1..HEAD | tail -1)
          fi

          {
            echo "features<<FEAT_EOF"
            echo "$FEATURES"
            echo "FEAT_EOF"
            echo "fixes<<FIX_EOF"
            echo "$FIXES"
            echo "FIX_EOF"
            echo "other<<OTHER_EOF"
            echo "$OTHER"
            echo "OTHER_EOF"
            echo "files<<FILES_EOF"
            echo "$FILES"
            echo "FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          cat > release-notes.md <<EOF
          ## ${{ steps.info.outputs.date }} — \`${{ steps.info.outputs.sha_short }}\`

          **Latest:** ${{ steps.info.outputs.message }}
          **Author:** ${{ steps.info.outputs.author }}
          **Stats:** ${{ steps.categories.outputs.files }}
          EOF

          if [ -n "${{ steps.categories.outputs.features }}" ]; then
            {
              echo ""
              echo "### Features"
              echo "${{ steps.categories.outputs.features }}"
            } >> release-notes.md
          fi

          if [ -n "${{ steps.categories.outputs.fixes }}" ]; then
            {
              echo ""
              echo "### Fixes"
              echo "${{ steps.categories.outputs.fixes }}"
            } >> release-notes.md
          fi

          if [ -n "${{ steps.categories.outputs.other }}" ]; then
            {
              echo ""
              echo "### Other"
              echo "${{ steps.categories.outputs.other }}"
            } >> release-notes.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: main-${{ steps.info.outputs.sha_short }}
          TITLE: ${{ steps.info.outputs.date }} — ${{ steps.info.outputs.sha_short }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TITLE" --notes-file release-notes.md
          fi

          gh release view "$TAG" --json url --jq '.url' >> "$GITHUB_STEP_SUMMARY"
