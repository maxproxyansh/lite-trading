databases:
  - name: lite-options-db
    databaseName: lite_options
    user: lite_options
    plan: starter

services:
  - type: web
    name: lite-options-api
    env: python
    rootDir: backend
    buildCommand: pip install --user --break-system-packages -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: LITE_DATABASE_URL
        fromDatabase:
          name: lite-options-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://lite-options-terminal.vercel.app
      - key: FRONTEND_ORIGIN_REGEX
        value: ^https://lite-options-terminal(?:-[a-z0-9-]+)?\\.vercel\\.app$
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: JWT_SECRET
        generateValue: true
      - key: DHAN_CLIENT_ID
        sync: false
      - key: DHAN_ACCESS_TOKEN
        sync: false
